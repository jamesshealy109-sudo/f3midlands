name: Deploy F3 Midlands to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages

    env:
      F3_NATION_API_KEY: ${{ secrets.F3_NATION_API_KEY }}
      F3_API_CLIENT: f3-midlands-site
      # These names define the site's official F3 organization scope only.
      # AO names, counts, descriptions, schedules, locations, coordinates,
      # directions, links, and contact details all come from F3 Nation.
      F3_TARGET_ORG_NAMES: Lexington,Columbia,Lake Murray,Camden,Saluda
      F3_MIN_AO_COUNT: '5'

    steps:
      - name: Checkout complete repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify F3 Nation secret is available
        shell: bash
        run: |
          if [[ -z "${F3_NATION_API_KEY:-}" ]]; then
            echo "::error title=F3 Nation API key unavailable::Add F3_NATION_API_KEY under Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi
          echo "F3_NATION_API_KEY is available to the workflow (${#F3_NATION_API_KEY} characters)."

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate complete AO directory from F3 Nation
        run: npm run sync:aos

      - name: Build Astro site
        run: npm run build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
