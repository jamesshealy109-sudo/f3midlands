name: Deploy F3 Midlands to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Pull current F3 Nation AO data and rebuild four times each day.
    - cron: '17 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout complete repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Pull active AO data and build site
        run: npm run build
        env:
          F3_NATION_API_KEY: ${{ secrets.F3_NATION_API_KEY }}
          F3_API_CLIENT: scalar-api
          F3_REGION_NAMES: Lexington,Columbia,Lake Murray,Camden,Saluda
          F3_MIN_AO_COUNT: '20'
          F3_SYNC_STRICT: 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
